<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vstack — Video Production Pipeline</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a1a;
  --card: #1a1a2e;
  --card-hover: #222240;
  --text: #e0e0e0;
  --text-dim: #888;
  --text-muted: #555;
  --accent: #4fc3f7;
  --accent-dim: #2a7a9e;
  --green: #66bb6a;
  --yellow: #fdd835;
  --red: #ef5350;
  --border: #2a2a4a;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

html { font-size: 15px; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── Header ─── */
#app-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: linear-gradient(180deg, #0d0d22 0%, rgba(10,10,26,0.95) 100%);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-size: 1.4rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
  user-select: none;
}
.logo span { color: var(--text-dim); font-weight: 400; font-size: 0.75rem; margin-left: 6px; letter-spacing: 0; }

.search-wrap {
  position: relative;
  flex: 1;
  max-width: 520px;
}
.search-wrap input {
  width: 100%;
  padding: 8px 14px 8px 36px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.9rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 0.85rem;
  pointer-events: none;
}

/* Search results dropdown */
.search-results {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  right: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-height: 420px;
  overflow-y: auto;
  display: none;
}
.search-results.visible { display: block; }
.search-results .sr-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.search-results .sr-item:last-child { border-bottom: none; }
.search-results .sr-item:hover { background: var(--card-hover); }
.sr-item .sr-top { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
.sr-item .sr-badge {
  font-size: 0.7rem;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--accent-dim);
  color: #fff;
  font-weight: 600;
  text-transform: uppercase;
}
.sr-item .sr-episode { font-size: 0.8rem; color: var(--text-dim); }
.sr-item .sr-subject { font-weight: 600; font-size: 0.9rem; }
.sr-item .sr-action { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
.sr-item .sr-score { font-size: 0.7rem; color: var(--text-muted); }
.search-results .sr-empty { padding: 20px; text-align: center; color: var(--text-muted); }

/* ─── Main content ─── */
#app { max-width: 1280px; margin: 0 auto; padding: 24px; }

/* ─── Stats banner ─── */
.stats-banner {
  display: flex;
  gap: 1px;
  background: var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 28px;
}
.stat-item {
  flex: 1;
  background: var(--card);
  padding: 16px 18px;
  text-align: center;
}
.stat-item .stat-val {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.2;
}
.stat-item .stat-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* ─── Breadcrumb / back ─── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-dim);
  font-size: 0.85rem;
  cursor: pointer;
  margin-bottom: 16px;
  transition: color 0.15s;
  background: none;
  border: none;
  font-family: inherit;
}
.back-btn:hover { color: var(--accent); }

/* ─── Page titles ─── */
.page-title {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 20px;
}
.page-title .subtitle { font-size: 0.9rem; color: var(--text-dim); font-weight: 400; margin-left: 10px; }

/* ─── Card grids ─── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  border-color: var(--accent-dim);
  box-shadow: 0 4px 20px rgba(79,195,247,0.08);
}

.card-thumb {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, #1a1a2e 0%, #2a2a4e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 2rem;
  overflow: hidden;
  position: relative;
}
.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.thumb-shuffle { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,0.6); border: none; color: #fff; cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; z-index: 2; }
.card-thumb:hover .thumb-shuffle { opacity: 1; }
.thumb-shuffle:hover { background: rgba(79,195,247,0.8); }
.card-thumb .thumb-placeholder {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: center;
}

.card-body { padding: 14px 16px; }
.card-body .card-id { font-size: 0.75rem; color: var(--accent); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; }
.card-body .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-body .card-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.78rem; color: var(--text-dim); }
.card-body .card-meta span { display: flex; align-items: center; gap: 4px; }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 0.7rem;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
}
.badge-green { background: rgba(102,187,106,0.15); color: var(--green); }
.badge-gray { background: rgba(136,136,136,0.15); color: var(--text-dim); }

/* Add collection card */
.card-add {
  border: 2px dashed var(--border);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 180px;
  cursor: default;
  opacity: 0.5;
  transition: opacity 0.2s;
}
.card-add:hover { opacity: 0.7; transform: none; border-color: var(--text-muted); box-shadow: none; }
.card-add-inner { text-align: center; color: var(--text-muted); }
.card-add-inner .plus { font-size: 2rem; line-height: 1; margin-bottom: 4px; }
.card-add-inner .label { font-size: 0.85rem; }
.card-hidden { opacity: 0.35; filter: grayscale(0.8); }
.card-hidden:hover { opacity: 0.6; }
.hide-toggle { position: absolute; top: 8px; right: 8px; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 4px; z-index: 2; }
.hide-toggle:hover { color: var(--red); background: rgba(255,255,255,0.05); }
.card { position: relative; }

/* ─── Episode detail ─── */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-bottom: 24px;
}
@media (max-width: 700px) { .detail-grid { grid-template-columns: 1fr; } }

.detail-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}
.detail-card h3 {
  font-size: 0.85rem;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
  font-weight: 600;
}

/* Raw data tables */
.raw-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
.raw-table th { text-align: left; color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; padding: 4px 8px; border-bottom: 1px solid #333; }
.raw-table td { padding: 4px 8px; border-bottom: 1px solid #1a1a2e; color: var(--text-dim); }
.raw-table tr:hover td { background: rgba(79,195,247,0.05); }
.raw-key { color: var(--accent); font-family: monospace; font-weight: 600; }
.raw-val { color: var(--text); }

/* Bar chart */
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.bar-label { width: 110px; font-size: 0.82rem; text-align: right; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 18px; background: rgba(79,195,247,0.08); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; min-width: 2px; }
.bar-val { width: 36px; font-size: 0.75rem; color: var(--text-dim); text-align: right; flex-shrink: 0; }

/* Scene list */
.scene-list { max-height: 400px; overflow-y: auto; }
.scene-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(42,42,74,0.5);
  font-size: 0.85rem;
}
.scene-row:last-child { border-bottom: none; }
.scene-num { width: 36px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
.scene-loc { flex: 1; }
.scene-mood { color: var(--text-dim); font-size: 0.78rem; }

/* Action button */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  background: rgba(79,195,247,0.1);
  color: var(--accent);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.btn:hover { background: rgba(79,195,247,0.2); }
.btn-secondary { border-color: var(--text-muted); color: var(--text-dim); background: rgba(255,255,255,0.03); }
.btn-secondary:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.btn-warn { border-color: #ff9800; color: #ff9800; background: rgba(255,152,0,0.08); }
.btn-warn:hover { background: rgba(255,152,0,0.15); }
.btn-danger { border-color: #e94560; color: #e94560; background: rgba(233,69,96,0.08); }
.btn-danger:hover { background: rgba(233,69,96,0.15); }
.btn.loading { opacity: 0.5; pointer-events: none; }

/* ─── Loading / error ─── */
.loading-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  color: var(--text-dim);
  gap: 12px;
}
.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-wrap {
  text-align: center;
  padding: 40px;
  color: var(--red);
}
.error-wrap .error-msg { font-size: 0.9rem; margin-top: 8px; color: var(--text-dim); }

/* ─── Scrollbar ─── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Responsive ─── */
@media (max-width: 600px) {
  #app-header { padding: 0 12px; gap: 10px; }
  #app { padding: 16px; }
  .stats-banner { flex-wrap: wrap; }
  .stat-item { min-width: 33%; }
  .card-grid { grid-template-columns: 1fr; }
  .page-title { font-size: 1.3rem; }
}

/* Fade-in */
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ─── File Browser ─── */
.file-browser {
  background: #0a0a1a;
  border: 1px solid var(--border);
  border-radius: 6px;
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 12px;
}
.file-breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  background: rgba(79,195,247,0.05);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
  flex-wrap: wrap;
}
.file-breadcrumb span {
  cursor: pointer;
  color: var(--accent);
  transition: opacity 0.15s;
}
.file-breadcrumb span:hover { opacity: 0.7; }
.file-breadcrumb .sep { color: var(--text-muted); cursor: default; }
.file-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  font-size: 0.82rem;
  cursor: pointer;
  border-bottom: 1px solid rgba(42,42,74,0.3);
  transition: background 0.12s;
}
.file-entry:last-child { border-bottom: none; }
.file-entry:hover { background: rgba(79,195,247,0.06); }
.file-entry.selected { background: rgba(102,187,106,0.12); border-left: 3px solid var(--green); }
.file-entry.srt { opacity: 0.4; cursor: default; }
.file-entry .file-icon { flex-shrink: 0; font-size: 1rem; }
.file-entry .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-entry .file-size { flex-shrink: 0; font-size: 0.7rem; color: var(--text-muted); }

/* ─── Add Episode Dialog ─── */
.add-ep-dialog { background: var(--card); border-radius: 12px; padding: 24px; width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto; border: 1px solid #333; }
.add-ep-dialog h3 { color: var(--accent); margin-bottom: 16px; }
.add-ep-dialog label { display: block; font-size: 0.78rem; color: var(--text-dim); margin-bottom: 4px; margin-top: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
.add-ep-dialog input, .add-ep-dialog select {
  width: 100%; padding: 8px 10px; background: #0a0a1a; border: 1px solid #333;
  color: #eee; border-radius: 4px; font-size: 13px; font-family: inherit;
}
.add-ep-dialog input:focus, .add-ep-dialog select:focus { border-color: var(--accent); outline: none; }
.add-ep-dialog .cost-row {
  display: flex; gap: 16px; margin-top: 14px; padding: 12px; background: rgba(79,195,247,0.05);
  border-radius: 6px; font-size: 0.85rem; align-items: center;
}
.add-ep-dialog .cost-row .cost-val { font-weight: 700; color: var(--accent); }

/* ─── Progress Card ─── */
.progress-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  min-height: 180px;
}
.progress-card .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.progress-card .progress-header .ep-id { font-weight: 700; color: var(--accent); font-size: 0.85rem; }
.progress-card .progress-header .elapsed { font-size: 0.7rem; color: var(--text-muted); }
.progress-bar {
  width: 100%; height: 6px; background: rgba(79,195,247,0.1);
  border-radius: 3px; overflow: hidden; margin-bottom: 10px;
}
.progress-bar .progress-fill {
  height: 100%; background: var(--accent); border-radius: 3px;
  transition: width 0.4s ease;
}
.progress-bar .progress-fill.complete { background: var(--green); }
.progress-bar .progress-fill.failed { background: var(--red); }
.progress-step {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.82rem; padding: 3px 0; color: var(--text-dim);
}
.progress-step.active { color: var(--text); font-weight: 600; }
.progress-step .step-icon { width: 18px; text-align: center; flex-shrink: 0; }
.progress-stats {
  display: flex; gap: 14px; margin-top: 8px; font-size: 0.75rem; color: var(--text-muted);
}
.progress-actions {
  display: flex; gap: 6px; margin-top: 10px;
}
.progress-actions button {
  padding: 4px 10px; font-size: 0.75rem; border-radius: 4px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.03);
  color: var(--text-dim); cursor: pointer; font-family: inherit;
  transition: background 0.15s;
}
.progress-actions button:hover { background: rgba(255,255,255,0.08); color: var(--text); }
.progress-warning { color: var(--yellow); font-size: 0.75rem; margin-top: 6px; }
/* Terminal log viewer */
.log-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center }
.log-modal { width:90vw;max-width:1000px;height:80vh;background:#0a0a0a;border:1px solid #333;border-radius:10px;display:flex;flex-direction:column;overflow:hidden }
.log-header { display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#111;border-bottom:1px solid #333 }
.log-header .log-title { color:var(--accent);font-weight:700;font-size:0.85rem;font-family:monospace }
.log-header .log-meta { color:var(--text-muted);font-size:0.7rem }
.log-header button { background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px 8px }
.log-header button:hover { color:#fff }
.log-body { flex:1;overflow-y:auto;padding:12px 16px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:11px;line-height:1.6;color:#ccc;white-space:pre-wrap;word-break:break-all }
.log-body .log-line { padding:1px 0 }
.log-body .log-line.error { color:#ef5350 }
.log-body .log-line.warning { color:#ffa726 }
.log-body .log-line.success { color:#66bb6a }
.log-body .log-line.info { color:#42a5f5 }
.log-body .log-line.cache { color:#ab47bc }
.log-footer { display:flex;align-items:center;justify-content:space-between;padding:6px 16px;background:#111;border-top:1px solid #333;font-size:0.7rem;color:var(--text-muted) }
</style>
</head>
<body>

<header id="app-header">
  <div class="logo" onclick="window.location.hash='/home'">VSTACK<span>video production pipeline</span></div>
</header>

<main id="app"></main>

<script>
(function() {
  // ─── State ───
  let globalStats = null;
  let seriesList = null;
  let episodeCache = {};
  let episodeDetailCache = {};
  let searchTimeout = null;
  const app = document.getElementById('app');

  // ─── API helpers ───
  async function api(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error(`API ${res.status}: ${path}`);
    return res.json();
  }

  function fmtNum(n) {
    if (n == null) return '--';
    return Number(n).toLocaleString();
  }

  function fmtDate(d) {
    if (!d) return '--';
    const dt = new Date(d);
    if (isNaN(dt)) return d;
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fmtDuration(sec) {
    if (!sec) return '--';
    const m = Math.floor(sec / 60);
    const s = Math.round(sec % 60);
    return `${m}m ${s < 10 ? '0' : ''}${s}s`;
  }

  function truncate(s, len) {
    if (!s) return '';
    return s.length > len ? s.slice(0, len) + '...' : s;
  }

  // ─── Rendering helpers ───
  function html(tag, attrs, ...children) {
    const el = document.createElement(tag);
    if (attrs) Object.entries(attrs).forEach(([k, v]) => {
      if (k === 'className') el.className = v;
      else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k === 'innerHTML') el.innerHTML = v;
      else el.setAttribute(k, v);
    });
    children.flat().forEach(c => {
      if (c == null) return;
      el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return el;
  }

  function renderLoading() {
    return html('div', { className: 'loading-wrap' },
      html('div', { className: 'spinner' }),
      html('div', null, 'Loading...')
    );
  }

  function renderError(msg) {
    return html('div', { className: 'error-wrap' },
      html('div', null, 'Unable to connect'),
      html('div', { className: 'error-msg' }, msg || 'Check that the server is running on this port.')
    );
  }

  function renderStatsBanner(stats) {
    const items = [
      ['Episodes', stats.episodes],
      ['Scenes', stats.scenes],
      ['Shots', stats.shots],
      ['Dialogue', stats.dialogue],
      ['DB Size', stats.dbSize || '--'],
    ];
    const banner = html('div', { className: 'stats-banner' });
    items.forEach(([label, val]) => {
      const isStr = typeof val === 'string';
      banner.appendChild(html('div', { className: 'stat-item' },
        html('div', { className: 'stat-val' }, isStr ? val : fmtNum(val)),
        html('div', { className: 'stat-label' }, label)
      ));
    });
    return banner;
  }

  // ─── Episode grid (Series) ───
  async function renderSeries(seriesId) {
    app.innerHTML = '';
    app.appendChild(renderLoading());

    try {
      const episodes = episodeCache[seriesId] || await api('/api/episodes?series=' + encodeURIComponent(seriesId));
      episodeCache[seriesId] = episodes;

      // Get series title
      if (!seriesList) seriesList = await api('/api/series');
      const seriesInfo = seriesList.find(s => String(s.id) === String(seriesId));

      app.innerHTML = '';
      const wrap = html('div', { className: 'fade-in' });

      // Back button — always show
      wrap.appendChild(html('button', { className: 'back-btn', onClick: () => navigate('/home') },
        '\u2190 Media Library'
      ));

      wrap.appendChild(html('h1', { className: 'page-title' },
        seriesInfo ? seriesInfo.title : `Series ${seriesId}`,
        html('span', { className: 'subtitle' }, `${episodes.length} episodes`)
      ));

      // Series stats
      const totalShots = episodes.reduce((a, e) => a + (e.shot_count || 0), 0);
      const totalScenes = episodes.reduce((a, e) => a + (e.scene_count || 0), 0);
      const totalDialogue = episodes.reduce((a, e) => a + (e.dialogue_count || 0), 0);
      const statsBanner = html('div', { className: 'stats-banner' });
      [
        ['Episodes', episodes.length],
        ['Scenes', totalScenes],
        ['Shots', totalShots],
        ['Dialogue', totalDialogue],
      ].forEach(([label, val]) => {
        statsBanner.appendChild(html('div', { className: 'stat-item' },
          html('div', { className: 'stat-val' }, fmtNum(val)),
          html('div', { className: 'stat-label' }, label)
        ));
      });
      wrap.appendChild(statsBanner);

      const grid = html('div', { className: 'card-grid' });

      episodes.forEach(ep => {
        const card = html('div', { className: 'card', onClick: () => navigate('/episode/' + ep.id) });

        // Thumbnail
        const thumb = html('div', { className: 'card-thumb' });
        const img = document.createElement('img');
        img.src = ep.thumbnail ? `/${ep.thumbnail}` : `/${ep.id}/frames/sc1_sh4_first.jpg`;
        img.alt = ep.title || ep.id;
        img.loading = 'lazy';
        img.onerror = function() {
          this.style.display = 'none';
          thumb.appendChild(html('div', { className: 'thumb-placeholder' }, ep.id));
        };
        thumb.appendChild(img);

        // Random thumbnail button
        const shuffleBtn = html('button', {
          className: 'thumb-shuffle',
          title: 'Random thumbnail',
          onClick: async (e) => {
            e.stopPropagation();
            try {
              const resp = await fetch('/api/random-thumbnail/' + encodeURIComponent(ep.id));
              const data = await resp.json();
              if (data.thumbnail) {
                img.style.opacity = '0.3';
                img.src = '/' + data.thumbnail;
                img.onload = () => { img.style.opacity = '1'; img.style.display = ''; };
                // Save to database and bust cache
                await fetch('/api/set-thumbnail/' + encodeURIComponent(ep.id), {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ thumbnail: data.thumbnail })
                });
                // Update cached episode data so reload shows the saved thumbnail
                ep.thumbnail = data.thumbnail;
                if (episodeCache) {
                  for (const key of Object.keys(episodeCache)) {
                    const cached = episodeCache[key];
                    if (Array.isArray(cached)) {
                      const match = cached.find(e => e.id === ep.id);
                      if (match) match.thumbnail = data.thumbnail;
                    }
                  }
                }
              }
            } catch {}
          }
        }, '\uD83C\uDFB2');
        thumb.appendChild(shuffleBtn);

        card.appendChild(thumb);

        // Body
        const hasScenes = ep.scene_count && ep.scene_count > 0;
        const badge = html('span', { className: 'badge ' + (hasScenes ? 'badge-green' : 'badge-gray') },
          hasScenes ? '\u2705 Analyzed' : '\u23F3 Pending'
        );

        const title = ep.title || (ep.filename ? truncate(ep.filename, 30) : ep.id);

        card.appendChild(html('div', { className: 'card-body' },
          html('div', { className: 'card-id' }, ep.id),
          html('div', { className: 'card-title' }, title),
          html('div', { className: 'card-meta' },
            html('span', null, `${fmtNum(ep.scene_count)} scenes`),
            html('span', null, `${fmtNum(ep.shot_count)} shots`),
            badge
          )
        ));

        grid.appendChild(card);
      });

      // Check for any active analyses and show progress cards
      try {
        const activeResp = await fetch('/api/active-analyses');
        if (activeResp.ok) {
          const active = await activeResp.json();
          for (const a of active) {
            if (a.phase === 'complete') continue; // Skip completed, they'll show as regular cards
            const progressCard = html('div', { className: 'card progress-card', id: 'progress-' + a.episodeId });
            grid.appendChild(progressCard);
            renderAnalysisProgress(a.episodeId, progressCard, seriesId);
          }
        }
      } catch {}

      // Add Episode card
      const addCard = html('div', { className: 'card card-add', onClick: () => showAddEpisodeDialog(seriesId) },
        html('div', { className: 'card-add-inner' },
          html('div', { className: 'plus' }, '+'),
          html('div', { className: 'label' }, 'Add Episode')
        )
      );
      grid.appendChild(addCard);

      // New Supercut card
      const supercutCard = html('div', { className: 'card card-add', style: 'border-color:#e94560', onClick: () => showNewSupercutDialog() },
        html('div', { className: 'card-add-inner' },
          html('div', { className: 'plus', style: 'color:#e94560' }, '\u2702'),
          html('div', { className: 'label' }, 'New Supercut')
        )
      );
      grid.appendChild(supercutCard);

      // Show existing supercut projects
      try {
        const supercuts = await api('/api/supercuts');
        for (const sc of supercuts) {
          const scCard = html('div', { className: 'card', style: 'border-left:3px solid #e94560;cursor:pointer', onClick: () => navigate('/supercut/' + encodeURIComponent(sc.name)) });
          scCard.appendChild(html('div', { className: 'card-body' },
            html('div', { className: 'card-title', style: 'color:#e94560' }, '\u2702 ' + sc.name),
            html('div', { className: 'card-meta' },
              html('span', null, sc.clipCount + ' clips'),
              html('span', null, sc.query ? '"' + sc.query + '"' : '')
            )
          ));
          grid.appendChild(scCard);
        }
      } catch {}

      wrap.appendChild(grid);

      // Queue display
      try {
        const queue = await api('/api/queue');
        const activeQueue = queue.filter(q => q.status === 'queued' || q.status === 'analyzing');
        if (activeQueue.length > 0) {
          const queueSection = html('div', { className: 'detail-card', style: 'margin-bottom:16px' });
          queueSection.appendChild(html('h3', null, '\u{1F4CB} Analysis Queue (' + activeQueue.length + ')'));

          activeQueue.forEach((item, idx) => {
            const row = html('div', { style: 'display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #1a1a2e' });

            const statusIcon = item.status === 'analyzing' ? '\u{1F504}' : '\u{23F3}';
            const posLabel = item.status === 'analyzing' ? 'Processing' : '#' + (idx + 1);

            row.appendChild(html('span', { style: 'font-size:16px' }, statusIcon));
            row.appendChild(html('span', { style: 'color:var(--accent);font-weight:bold;min-width:60px' }, item.episodeId));
            row.appendChild(html('span', { style: 'color:var(--text-dim);flex:1' }, item.title || item.videoPath?.split(/[\\/]/).pop() || ''));
            row.appendChild(html('span', { style: 'color:var(--text-muted);font-size:11px' }, posLabel));

            // Delete button
            const deleteBtn = html('button', {
              style: 'background:none;border:1px solid #333;color:var(--red);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px',
              onClick: async (e) => {
                e.stopPropagation();
                if (!confirm('Remove ' + item.episodeId + ' from queue?')) return;
                await fetch('/api/queue/' + encodeURIComponent(item.episodeId), { method: 'DELETE' });
                delete episodeCache[seriesId];
                renderSeries(seriesId);
              }
            }, '\u2716 Remove');
            row.appendChild(deleteBtn);

            queueSection.appendChild(row);
          });

          // Clear completed button
          const completedCount = queue.filter(q => q.status === 'complete' || q.status === 'failed').length;
          if (completedCount > 0) {
            queueSection.appendChild(html('div', { style: 'text-align:center;padding:8px' },
              html('button', {
                className: 'btn btn-secondary',
                style: 'font-size:11px',
                onClick: async () => {
                  await fetch('/api/queue/clear-completed', { method: 'POST' });
                  delete episodeCache[seriesId];
                  renderSeries(seriesId);
                }
              }, 'Clear ' + completedCount + ' completed')
            ));
          }

          wrap.appendChild(queueSection);
        }
      } catch {}

      // Collection actions
      const actions = html('div', { style: 'display:flex;gap:10px;margin-top:20px;justify-content:center' });

      // Export button
      actions.appendChild(html('button', {
        className: 'btn',
        style: 'background:#1b5e20',
        onClick: () => {
          window.location.href = '/api/export/' + encodeURIComponent(seriesId);
        }
      }, '\u{1F4E6} Export Collection'));

      // Import collection button
      actions.appendChild(html('button', {
        className: 'btn',
        style: 'background:#0d3b66',
        onClick: () => showImportDialog()
      }, '\u{1F4E5} Import Collection'));

      // Restore single episode button
      const restoreEpInput = document.createElement('input');
      restoreEpInput.type = 'file';
      restoreEpInput.accept = '.zip';
      restoreEpInput.style.display = 'none';
      restoreEpInput.onchange = (e) => {
        if (e.target.files[0]) restoreEpisodeFromFile(e.target.files[0], seriesId);
        restoreEpInput.value = '';
      };
      actions.appendChild(html('button', {
        className: 'btn btn-secondary',
        onClick: () => restoreEpInput.click()
      }, '\u{1F4E5} Restore Episode'));
      actions.appendChild(restoreEpInput);

      wrap.appendChild(actions);

      app.appendChild(wrap);
    } catch (e) {
      app.innerHTML = '';
      app.appendChild(renderError(e.message));
    }
  }

  // ─── Episode detail ───
  async function renderEpisode(episodeId) {
    app.innerHTML = '';
    app.appendChild(renderLoading());

    try {
      const ep = episodeDetailCache[episodeId] || await api('/api/episode/' + encodeURIComponent(episodeId));
      episodeDetailCache[episodeId] = ep;

      // Find which series this belongs to
      let parentSeriesId = null;
      if (seriesList) {
        // Try to find from episode cache
        for (const [sid, eps] of Object.entries(episodeCache)) {
          if (eps.some(e => String(e.id) === String(episodeId))) { parentSeriesId = sid; break; }
        }
      }

      app.innerHTML = '';
      const wrap = html('div', { className: 'fade-in' });

      // Back
      wrap.appendChild(html('button', { className: 'back-btn', onClick: () => {
        if (parentSeriesId) navigate('/series/' + parentSeriesId);
        else navigate('/');
      }}, '\u2190 Back'));

      const titleRow = html('div', { style: 'display:flex;align-items:center;gap:10px;margin-bottom:4px' });
      const titleEl = html('h1', { className: 'page-title', style: 'margin-bottom:0', id: 'ep-title' }, ep.title || episodeId);
      titleRow.appendChild(titleEl);
      titleRow.appendChild(html('button', {
        style: 'background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px',
        title: 'Rename episode',
        onClick: () => showRenameDialog(episodeId, ep.title || episodeId)
      }, '\u270E'));
      wrap.appendChild(titleRow);

      // Action buttons (top of page)
      const btnWrap = html('div', { style: 'margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap' });

      btnWrap.appendChild(html('button', { className: 'btn', onClick: () => {
        window.open('/' + episodeId + '/scene-review-report.html', '_blank');
      }}, '\u{1F4CB} Scene Review Report'));

      btnWrap.appendChild(html('button', { className: 'btn btn-secondary', onClick: () => rebuildReport(episodeId) },
        '\u{1F504} Rebuild Report'));

      btnWrap.appendChild(html('button', { className: 'btn', style: 'background:#9c27b0', onClick: async () => {
        const btn = event.target;
        btn.textContent = '\u23F3 Starting diarization...';
        btn.disabled = true;
        try {
          const resp = await fetch('/api/tier15/start', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ episodeId })
          });
          const result = await resp.json();
          if (resp.ok) {
            btn.textContent = '\u{1F3A4} Running...';
            // Open log viewer
            const logOverlay = html('div', { className: 'log-overlay' });
            const logBox = html('div', { style: 'background:#0a0a1a;border-radius:12px;width:800px;max-width:95vw;max-height:85vh;overflow:hidden;display:flex;flex-direction:column' });
            logBox.appendChild(html('div', { style: 'padding:12px 16px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center' },
              html('strong', { style: 'color:#9c27b0' }, '\u{1F3A4} Tier 1.5 — Speaker Diarization'),
              html('button', { style: 'background:none;border:none;color:#888;font-size:18px;cursor:pointer', onClick: () => logOverlay.remove() }, '\u2716')
            ));
            const logContent = html('pre', { style: 'flex:1;overflow-y:auto;padding:12px 16px;font-size:11px;color:#ccc;white-space:pre-wrap;font-family:monospace;margin:0' }, 'Starting...');
            logBox.appendChild(logContent);
            logOverlay.appendChild(logBox);
            document.body.appendChild(logOverlay);

            // Poll log
            const pollInterval = setInterval(async () => {
              try {
                const logResp = await fetch('/api/tier15/log/' + encodeURIComponent(episodeId));
                const logText = await logResp.text();
                if (logText) logContent.textContent = logText;
                logContent.scrollTop = logContent.scrollHeight;

                const statusResp = await fetch('/api/tier15/status/' + encodeURIComponent(episodeId));
                const status = await statusResp.json();
                if (status.phase === 'complete') {
                  clearInterval(pollInterval);
                  btn.textContent = '\u2705 Speakers identified!';
                  btn.disabled = false;
                  setTimeout(() => { btn.textContent = '\u{1F3A4} Tier 1.5 Speakers'; }, 3000);
                } else if (status.phase === 'failed') {
                  clearInterval(pollInterval);
                  btn.textContent = '\u274C Failed';
                  btn.disabled = false;
                  setTimeout(() => { btn.textContent = '\u{1F3A4} Tier 1.5 Speakers'; }, 3000);
                }
              } catch {}
            }, 3000);
          } else {
            btn.textContent = '\u274C ' + (result.error || 'Failed');
            btn.disabled = false;
            setTimeout(() => { btn.textContent = '\u{1F3A4} Tier 1.5 Speakers'; }, 3000);
          }
        } catch (e) {
          btn.textContent = '\u274C Error';
          btn.disabled = false;
          alert(e.message);
          setTimeout(() => { btn.textContent = '\u{1F3A4} Tier 1.5 Speakers'; }, 3000);
        }
      }}, '\u{1F3A4} Tier 1.5 Speakers'));

      const epTitle = (ep.title || episodeId).replace(/[^a-zA-Z0-9_\- ]/g, '');
      btnWrap.appendChild(html('button', { className: 'btn btn-secondary', onClick: () => exportEpisode(episodeId, epTitle) },
        '\u{1F4E6} Export Episode'));

      const importInput = document.createElement('input');
      importInput.type = 'file';
      importInput.accept = '.zip';
      importInput.style.display = 'none';
      importInput.onchange = (e) => { if (e.target.files[0]) importEpisode(episodeId, e.target.files[0]); };
      btnWrap.appendChild(html('button', { className: 'btn btn-secondary', onClick: () => importInput.click() },
        '\u{1F4E5} Restore from Backup'));
      btnWrap.appendChild(importInput);

      try {
        const backupStatus = await fetch('/api/backup-status/' + encodeURIComponent(episodeId)).then(r => r.json());
        if (backupStatus.exists) {
          btnWrap.appendChild(html('button', {
            className: 'btn btn-warn',
            onClick: () => revertEpisode(episodeId)
          }, '\u21a9 Revert to Original'));
        }
      } catch {}

      btnWrap.appendChild(html('button', {
        className: 'btn btn-danger',
        onClick: () => deleteEpisode(episodeId, parentSeriesId)
      }, '\u{1F5D1} Delete Episode'));

      wrap.appendChild(btnWrap);

      // Quick stats
      const qstats = html('div', { className: 'stats-banner' });
      [
        ['Scenes', ep.scenes ? ep.scenes.length : (ep.scene_count || '--')],
        ['Shots', ep.shot_count || ep.shots || '--'],
        ['Dialogue', ep.dialogue_count || (ep.dialogue && ep.dialogue.length) || '--'],
        ['Duration', ep.duration_sec ? fmtDuration(ep.duration_sec) : '--'],
      ].forEach(([label, val]) => {
        const isStr = typeof val === 'string';
        qstats.appendChild(html('div', { className: 'stat-item' },
          html('div', { className: 'stat-val' }, isStr ? val : fmtNum(val)),
          html('div', { className: 'stat-label' }, label)
        ));
      });
      wrap.appendChild(qstats);

      // Detail grid
      const grid = html('div', { className: 'detail-grid' });

      // Top characters / subjects
      const subjects = ep.topSubjects || ep.topCharacters || [];
      if (subjects.length) {
        const maxVal = Math.max(...subjects.map(s => s.count || s.value || 0));
        const card = html('div', { className: 'detail-card' });
        card.appendChild(html('h3', null, 'Top Characters'));
        subjects.slice(0, 8).forEach(s => {
          const name = s.name || s.label || s.subject || '';
          const val = s.count || s.value || 0;
          const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
          card.appendChild(html('div', { className: 'bar-row' },
            html('div', { className: 'bar-label', title: name }, name),
            html('div', { className: 'bar-track' },
              html('div', { className: 'bar-fill', style: `width:${pct}%` })
            ),
            html('div', { className: 'bar-val' }, fmtNum(val))
          ));
        });
        grid.appendChild(card);
      }

      // Top speakers
      const speakers = ep.topSpeakers || [];
      if (speakers.length) {
        const maxVal = Math.max(...speakers.map(s => s.count || s.value || 0));
        const card = html('div', { className: 'detail-card' });
        card.appendChild(html('h3', null, 'Top Speakers'));
        speakers.slice(0, 8).forEach(s => {
          const name = s.name || s.label || s.speaker || '';
          const val = s.count || s.value || 0;
          const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
          card.appendChild(html('div', { className: 'bar-row' },
            html('div', { className: 'bar-label', title: name }, name),
            html('div', { className: 'bar-track' },
              html('div', { className: 'bar-fill', style: `width:${pct}%` })
            ),
            html('div', { className: 'bar-val' }, fmtNum(val))
          ));
        });
        grid.appendChild(card);
      }

      // Shot types
      const shotTypes = ep.shotTypes || [];
      if (shotTypes.length) {
        const maxVal = Math.max(...shotTypes.map(s => s.count || s.value || 0));
        const card = html('div', { className: 'detail-card' });
        card.appendChild(html('h3', null, 'Shot Types'));
        shotTypes.slice(0, 8).forEach(s => {
          const name = s.name || s.label || s.type || s.shot_type || '';
          const val = s.count || s.value || 0;
          const pct = maxVal > 0 ? (val / maxVal * 100) : 0;
          card.appendChild(html('div', { className: 'bar-row' },
            html('div', { className: 'bar-label', title: name }, name),
            html('div', { className: 'bar-track' },
              html('div', { className: 'bar-fill', style: `width:${pct}%` })
            ),
            html('div', { className: 'bar-val' }, fmtNum(val))
          ));
        });
        grid.appendChild(card);
      }

      // Scene list
      const scenes = ep.scenes || [];
      if (scenes.length) {
        const card = html('div', { className: 'detail-card' });
        card.appendChild(html('h3', null, `Scenes (${scenes.length})`));
        const list = html('div', { className: 'scene-list' });
        scenes.forEach((sc, i) => {
          list.appendChild(html('div', { className: 'scene-row' },
            html('span', { className: 'scene-num' }, String(i + 1)),
            html('span', { className: 'scene-loc' }, sc.location || sc.heading || '--'),
            html('span', { className: 'scene-mood' }, sc.mood || '')
          ));
        });
        card.appendChild(list);
        grid.appendChild(card);
      }

      wrap.appendChild(grid);

      // ── Analysis Settings (loaded from analysis-settings.json) ──
      try {
        const settingsResp = await fetch('/api/episode-settings/' + encodeURIComponent(episodeId));
        if (settingsResp.ok) {
          const settings = await settingsResp.json();
          if (settings) {
            const settingsCard = html('div', { className: 'detail-card', style: 'margin-top:16px' });
            const details = document.createElement('details');
            const summary = document.createElement('summary');
            summary.textContent = '\u2699 Analysis Settings & Parameters';
            summary.style.cssText = 'cursor:pointer;color:var(--text-muted);font-size:0.85rem;padding:4px 0';
            details.appendChild(summary);

  // Browse a specific table with pagination
  async function browseTable(tableName, offset = 0) {
    app.innerHTML = '';
    app.appendChild(renderLoading());

    try {
      const data = await api(`/api/raw-table/${encodeURIComponent(tableName)}?limit=50&offset=${offset}`);
      app.innerHTML = '';
      const wrap = html('div', { className: 'fade-in' });

      wrap.appendChild(html('button', { className: 'back-btn', onClick: () => navigate('/advanced') }, '\u2190 Back to Advanced'));
      wrap.appendChild(html('h1', { className: 'page-title' }, tableName));
      wrap.appendChild(html('div', { style: 'color:var(--text-muted);margin-bottom:12px;font-size:12px' },
        `${fmtNum(data.count)} total rows | Showing ${data.offset + 1}-${Math.min(data.offset + data.rows.length, data.count)}`
      ));

      const card = html('div', { className: 'detail-card' });
      const t = html('table', { className: 'raw-table', style: 'font-size:10px' });

      // Header
      const headerRow = html('tr');
      data.columns.forEach(col => headerRow.appendChild(html('th', null, col.name + ' (' + col.type + ')')));
      t.appendChild(headerRow);

      // Rows
      data.rows.forEach(row => {
        const tr = html('tr');
        data.columns.forEach(col => {
          const val = row[col.name];
          const display = val === null ? '--' : String(val).slice(0, 80) + (String(val).length > 80 ? '...' : '');
          tr.appendChild(html('td', { title: String(val || ''), style: 'max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap' }, display));
        });
        t.appendChild(tr);
      });
      card.appendChild(t);

      // Pagination
      const pagination = html('div', { style: 'display:flex;gap:10px;margin-top:12px;justify-content:center' });
      if (data.offset > 0) {
        pagination.appendChild(html('button', { className: 'btn', onClick: () => browseTable(tableName, Math.max(0, data.offset - 50)) }, '\u2190 Previous'));
      }
      if (data.offset + data.rows.length < data.count) {
        pagination.appendChild(html('button', { className: 'btn', onClick: () => browseTable(tableName, data.offset + 50) }, 'Next \u2192'));
      }
      card.appendChild(pagination);

      wrap.appendChild(card);
      app.appendChild(wrap);
    } catch (e) {
      app.innerHTML = '';
      app.appendChild(renderError(e.message));
    }
  }
