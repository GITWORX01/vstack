    async function browseDir(dir) {
      currentDir = dir;
      fileListEl.innerHTML = '';
      fileListEl.appendChild(html('div', { style: 'padding:12px;color:var(--text-muted);font-size:0.8rem' }, 'Loading...'));

      try {
        const resp = await fetch('/api/browse?dir=' + encodeURIComponent(dir));
        if (!resp.ok) throw new Error('Browse failed');
        const data = await resp.json();
        browseEntries = data.entries || [];
        currentDir = data.path || dir;

        // Breadcrumbs
        breadcrumbEl.innerHTML = '';
        const parts = currentDir.replace(/\\/g, '/').split('/').filter(Boolean);
        parts.forEach((part, i) => {
          if (i > 0) breadcrumbEl.appendChild(html('span', { className: 'sep' }, '/'));
          const fullPath = parts.slice(0, i + 1).join('/');
          breadcrumbEl.appendChild(html('span', { onClick: () => browseDir(fullPath) }, part));
        });

        fileListEl.innerHTML = '';
        if (browseEntries.length === 0) {
          fileListEl.appendChild(html('div', { style: 'padding:12px;color:var(--text-muted);font-size:0.8rem' }, 'Empty directory'));
          return;
        }

        const dirs = browseEntries.filter(e => e.type === 'directory');
        const files = browseEntries.filter(e => e.type !== 'directory');

        // Filter files based on browse mode
        const relevantExts = browseMode === 'srt' ? ['srt', 'sub', 'ass'] : ['mp4', 'mkv', 'avi', 'mov', 'wmv', 'webm'];

        dirs.forEach(entry => {
          fileListEl.appendChild(html('div', { className: 'file-entry', onClick: () => browseDir(entry.path) },
            html('span', { className: 'file-icon' }, '\uD83D\uDCC1'),
            html('span', { className: 'file-name' }, entry.name)
          ));
        });

        files.forEach(entry => {
          const ext = (entry.name.split('.').pop() || '').toLowerCase();
          const isRelevant = relevantExts.includes(ext);
          const isSelected = (browseMode === 'video' && selectedVideo && selectedVideo.path === entry.path)
            || (browseMode === 'srt' && srtInput.value === (entry.path || ''));

          if (!isRelevant && browseMode !== 'video') return; // In SRT mode, only show SRTs
          fileListEl.appendChild(html('div', {
            className: 'file-entry' + (isSelected ? ' selected' : '') + (!isRelevant ? ' srt' : ''),
            onClick: isRelevant ? () => selectFile(entry) : undefined,
            style: isRelevant ? 'cursor:pointer' : 'opacity:0.3;cursor:default'
          },
            html('span', { className: 'file-icon' }, isRelevant ? (browseMode === 'srt' ? '\uD83D\uDCDD' : '\uD83C\uDFAC') : '\uD83D\uDCC4'),
            html('span', { className: 'file-name' }, entry.name),
            entry.size ? html('span', { className: 'file-size' }, formatFileSize(entry.size)) : null
          ));
        });
      } catch (e) {
        fileListEl.innerHTML = '';
        fileListEl.appendChild(html('div', { style: 'padding:12px;color:var(--red);font-size:0.8rem' }, 'Error: ' + e.message));
      }
    }

    function formatFileSize(bytes) {
      if (!bytes) return '';
      if (bytes > 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
      if (bytes > 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
      return (bytes / 1e3).toFixed(0) + ' KB';
    }

    function selectFile(entry) {
      if (browseMode === 'srt') {
        selectedSrt = entry;
        srtInput.value = entry.path;
        srtInput.style.opacity = '1';
        browserOpen = false;
        browserPanel.style.display = 'none';
        browserLabel.style.display = 'none';
        return;
      }

      // Video selected
      selectedVideo = entry;
      videoInput.value = entry.path;
      autoDetectFromVideo(entry);
      browserOpen = false;
      browserPanel.style.display = 'none';
      browserLabel.style.display = 'none';
    }

    function autoDetectFromVideo(entry) {
      // Auto-detect episode ID
      const epMatch = entry.name.match(/[Ss](\d+)[Ee](\d+)/);
      if (epMatch) {
        idInput.value = 'S' + epMatch[1].padStart(2, '0') + 'E' + epMatch[2].padStart(2, '0');
      }

      // Auto-detect title
      let title = entry.name.replace(/\.[^.]+$/, '');
      title = title.replace(/.*[Ss]\d+[Ee]\d+[\s._-]*/, '');
      title = title.replace(/[\s._-]*\(?(\d{3,4})[Pp]\)?.*/, '');
      title = title.replace(/[._]/g, ' ').trim();
      if (title) titleInput.value = title;

      // Auto-detect SRT
      if (browseEntries.length > 0 && epMatch) {
        const srtEntry = browseEntries.find(e => {
          const ext = (e.name.split('.').pop() || '').toLowerCase();
          if (ext !== 'srt') return false;
          const srtEpMatch = e.name.match(/[Ss](\d+)[Ee](\d+)/);
          if (srtEpMatch && srtEpMatch[1] === epMatch[1] && srtEpMatch[2] === epMatch[2]) return true;
          const srtAlt = e.name.match(/(\d+)x(\d+)/i);
          if (srtAlt && parseInt(srtAlt[1]) === parseInt(epMatch[1]) && parseInt(srtAlt[2]) === parseInt(epMatch[2])) return true;
          return false;
        });
        if (srtEntry) {
          selectedSrt = srtEntry;
          srtInput.value = srtEntry.path;
          srtInput.style.opacity = '1';
        }
      }

      // Cost estimate from file size
      durationSec = null;
      if (entry.size) {
        const estHours = entry.size / (500 * 1e6);
        durationSec = Math.round(estHours * 3600);
        durationSpan.textContent = 'Duration: ~' + fmtDuration(durationSec) + ' (est.)';
        costSpan.textContent = '~$' + estimateCost(durationSec).toFixed(2);
      } else {
        durationSpan.textContent = 'Duration: unknown';
        costSpan.textContent = '';
      }
      updateSubmitState();
    }

    function estimateCost(sec) {
      // Tier 1 v2: single Gemini call with 240p video (~$0.80-1.00 per episode)
      // Input: ~180-250K tokens at $1.25/M (≤200K) or $2.50/M (>200K)
      // Output: ~15-25K tokens at $10/M
      // Thinking: ~5-15K tokens at $10/M
      // Rough estimate: base $0.50 + $0.01 per minute of video
      return 0.50 + (sec / 60) * 0.01;
    }

    function updateSubmitState() {
      const ready = (selectedVideo || videoInput.value.trim()) && idInput.value.trim();
      submitBtn.disabled = !ready;
      submitBtn.style.opacity = ready ? '1' : '0.4';
      submitBtn.textContent = durationSec ? 'Start Analysis (~$' + estimateCost(durationSec).toFixed(2) + ')' : 'Start Analysis';
      queueBtn.disabled = !ready;
      queueBtn.style.opacity = ready ? '1' : '0.4';
    }

    idInput.addEventListener('input', updateSubmitState);
    videoInput.addEventListener('input', updateSubmitState);

    async function addToQueue(overlay) {
      const epId = idInput.value.trim().toUpperCase();
      const videoPath = selectedVideo ? selectedVideo.path : videoInput.value.trim();
      if (!epId || !videoPath) { alert('Select a video file first'); return; }

      queueBtn.disabled = true;
      queueBtn.textContent = 'Adding...';

      try {
        const result = await fetch('/api/queue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            episodeId: epId,
            videoPath,
            srtPath: srtInput.value.trim() || null,
            title: titleInput.value.trim() || null,
            collectionId: collSelect.value || 'default',
            region: regionSelect.value || 'us-east1',
          })
        }).then(r => r.json());

        if (result.error) {
          statusDiv.textContent = result.error;
          statusDiv.style.color = 'var(--red)';
          queueBtn.disabled = false;
          queueBtn.textContent = '\u{1F4CB} Add to Queue';
          return;
        }

        overlay.remove();
        // Refresh to show queue
        if (typeof renderSeries === 'function' && collSelect.value) {
          delete episodeCache[collSelect.value];
          navigate('/series/' + collSelect.value);
        }
      } catch (e) {
        statusDiv.textContent = 'Error: ' + e.message;
        statusDiv.style.color = 'var(--red)';
        queueBtn.disabled = false;
        queueBtn.textContent = '\u{1F4CB} Add to Queue';
      }
    }

    async function startAnalysis() {
      const epId = idInput.value.trim().toUpperCase();
      const videoPath = selectedVideo ? selectedVideo.path : videoInput.value.trim();
      const srtPath = srtInput.value.trim() || undefined;
      const title = titleInput.value.trim() || undefined;
      const targetCollectionId = collSelect.value;
      const region = regionSelect.value;

      if (!epId || !videoPath) {
        statusDiv.textContent = 'Episode ID and video file are required';
        statusDiv.style.color = 'var(--red)';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.4';
      submitBtn.textContent = 'Starting...';
      statusDiv.textContent = 'Submitting...';
      statusDiv.style.color = 'var(--text-dim)';

      try {
        const retries = parseInt(retriesInput.value) || 0;
        const body = { episodeId: epId, videoPath, title, region, retries };
        if (srtPath) body.srtPath = srtPath;
        if (targetCollectionId) body.collectionId = targetCollectionId;
        const ctx = contextInput.value.trim();
        if (ctx) body.contentContext = ctx;

        const resp = await fetch('/api/start-analysis', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const result = await resp.json();

        if (resp.ok) {
          overlay.remove();
          delete episodeCache[targetCollectionId];

          const grid = document.querySelector('.card-grid');
          if (grid) {
            const addCardEl = grid.querySelector('.card-add');
            const progressCard = html('div', { className: 'card progress-card', id: 'progress-' + epId });
            if (addCardEl) grid.insertBefore(progressCard, addCardEl);
            else grid.appendChild(progressCard);
            renderAnalysisProgress(epId, progressCard, targetCollectionId);
          }
        } else {
          statusDiv.textContent = 'Error: ' + (result.error || 'Unknown error');
          statusDiv.style.color = 'var(--red)';
          submitBtn.disabled = false;
          submitBtn.style.opacity = '1';
          submitBtn.textContent = 'Start Analysis';
        }
      } catch (e) {
        statusDiv.textContent = 'Error: ' + e.message;
        statusDiv.style.color = 'var(--red)';
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
        submitBtn.textContent = 'Start Analysis';
      }
    }
  }

  // ─── Analysis Progress Display ───
  function renderAnalysisProgress(episodeId, card, collectionId) {
    let pollId = null;
    let startTime = Date.now();

    function getPhasePercent(phase, chunkNum, chunkTotal) {
      switch (phase) {
        case 'uploading': return 5;
        case 'caching': return 10;
        case 'analyzing':
          if (chunkTotal > 0) return 10 + (chunkNum / chunkTotal) * 70;
          return 40;
        case 'scene-detection': return 85;
        case 'extracting-frames': return 90;
        case 'building-report': return 95;
        case 'rebuilding-db': return 97;
        case 'complete': return 100;
        case 'failed': return 0;
        case 'paused': return -1; // keep current
        default: return 0;
      }
    }

    function getPhaseLabel(phase, detail) {
      switch (phase) {
        case 'uploading': return '\uD83D\uDCE4 Uploading to cloud...';
        case 'caching': return '\uD83D\uDDC4 Creating video cache...';
        case 'analyzing': return '\uD83E\uDD16 Analyzing' + (detail ? ' chunk ' + detail : '...');
        case 'scene-detection': return '\uD83D\uDD0D Detecting scene cuts...';
        case 'extracting-frames': return '\uD83D\uDCF8 Extracting frames...';
        case 'building-report': return '\uD83D\uDCDD Building report...';
        case 'rebuilding-db': return '\uD83D\uDDC3 Updating database...';
        case 'complete': return '\u2705 Analysis complete!';
        case 'failed': return '\u274C Failed' + (detail ? ': ' + detail : '');
        case 'paused': return '\u23F8 Paused';
        default: return 'Waiting...';
      }
    }

    function fmtElapsed(ms) {
      const sec = Math.floor(ms / 1000);
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return m + 'm ' + (s < 10 ? '0' : '') + s + 's';
    }

    let lastPct = 0;

    function render(status) {
      card.innerHTML = '';
      const phase = status.phase || 'waiting';
      // Map ALL status file fields
      const chunkNum = status.chunk || status.chunkNum || 0;
      const chunkTotal = status.totalChunks || status.chunkTotal || 0;
      const chunkRange = status.chunkRange || '';
      const totalScenes = status.totalScenesSoFar || status.scenes || status.totalScenes || 0;
      const totalShots = status.totalShotsSoFar || status.shots || status.shotsCompleted || 0;
      const currentScene = status.currentScene || 0;
      const passB = status.passB || false;
      const chunkScenes = status.chunkScenes || 0;
      const chunkShots = status.chunkShots || 0;
      const chunkComplete = status.chunkComplete || false;
      const estCost = status.estimatedCost || status.cost || 0;
      const region = status.region || '';
      const videoFile = status.videoFile || '';
      const step = status.step || '';
      const elapsed = status.elapsed ? fmtElapsed(status.elapsed * 1000) : fmtElapsed(Date.now() - startTime);

      let pct = getPhasePercent(phase, chunkNum, chunkTotal);
      if (pct === -1) pct = lastPct;
      else lastPct = pct;

      // Header
      const header = html('div', { className: 'progress-header' },
        html('span', { className: 'ep-id' }, episodeId + (videoFile ? ' — ' + videoFile : '')),
        html('span', { className: 'elapsed' }, elapsed)
      );
      card.appendChild(header);

      // Progress bar
      const fillClass = phase === 'complete' ? ' complete' : phase === 'failed' ? ' failed' : '';
      const bar = html('div', { className: 'progress-bar' },
        html('div', { className: 'progress-fill' + fillClass, style: 'width:' + pct + '%' })
      );
      card.appendChild(bar);

      // Phase label with rich detail
      var detail = '';
      if (phase === 'analyzing') {
        var parts = [];
        if (chunkTotal > 0) parts.push('Chunk ' + chunkNum + '/' + chunkTotal);
        if (chunkRange) parts.push('(' + chunkRange + ')');
        if (passB && currentScene > 0 && totalScenes > 0) {
          parts.push('Shot scan: scene ' + currentScene + '/' + totalScenes);
        } else if (!passB && step) {
          parts.push(step);
        }
        detail = parts.join(' \u2022 ');
      } else if (phase === 'failed') {
        detail = status.error || '';
      } else if (step) {
        detail = step;
      }
      const label = html('div', { className: 'progress-step active' },
        html('span', { className: 'step-icon' }, phase === 'complete' ? '\u2705' : phase === 'failed' ? '\u274C' : '\u23F3'),
        html('span', null, getPhaseLabel(phase, detail))
      );
      card.appendChild(label);

      // Live detail line
      if (phase === 'analyzing') {
        var detailParts = [];
        if (totalShots > 0) detailParts.push(totalShots + ' shots found');
        if (passB) detailParts.push('Pass B: getting shots per scene');
        else detailParts.push('Pass A: identifying scenes');
        if (step && !detail.includes(step)) detailParts.push(step);

        card.appendChild(html('div', { style: 'font-size:0.72rem;color:var(--text-muted);padding:2px 0 4px 22px' },
          detailParts.join(' \u2022 ')
        ));
      } else if (phase === 'uploading' || phase === 'caching') {
        if (step) {
          card.appendChild(html('div', { style: 'font-size:0.72rem;color:var(--text-muted);padding:2px 0 4px 22px' }, step));
        }
      }

      // Stats row — show all available data
      const stats = html('div', { className: 'progress-stats' });
      if (totalScenes > 0) stats.appendChild(html('span', null, '\uD83C\uDFAC ' + totalScenes + ' scenes'));
      if (totalShots > 0) stats.appendChild(html('span', null, '\uD83D\uDCF7 ' + totalShots + ' shots'));
      if (currentScene > 0 && totalScenes > 0 && passB) stats.appendChild(html('span', null, '\uD83C\uDFAF Scene ' + currentScene + '/' + totalScenes));
      if (chunkTotal > 0) stats.appendChild(html('span', null, '\uD83D\uDCE6 Chunk ' + chunkNum + '/' + chunkTotal));
      if (estCost > 0) stats.appendChild(html('span', null, '\uD83D\uDCB0 ~$' + Number(estCost).toFixed(2)));
      if (region) stats.appendChild(html('span', null, '\uD83C\uDF10 ' + region));
      if (status.cached === true) {
        stats.appendChild(html('span', { style: 'color:#4caf50' }, '\uD83D\uDCBE Cached'));
      } else if (status.cached === false) {
        stats.appendChild(html('span', { style: 'color:#e94560;font-weight:bold' }, '\u26A0 UNCACHED'));
      }
      // If cached field is missing (old process), don't show either — we don't know
      if (stats.children.length > 0) card.appendChild(stats);

      // Stale heartbeat warning
      if (status.stale && phase !== 'complete' && phase !== 'failed') {
        card.appendChild(html('div', { className: 'progress-warning' }, '\u26A0 May be stuck \u2014 no heartbeat for 2+ minutes'));
      }

      // Action buttons
      const actions = html('div', { className: 'progress-actions' });
      if (phase !== 'complete' && phase !== 'failed') {
        if (phase === 'paused') {
          actions.appendChild(html('button', { onClick: () => controlAnalysis('resume') }, '\u25B6 Resume'));
        } else {
          actions.appendChild(html('button', { onClick: () => controlAnalysis('pause') }, '\u23F8 Pause'));
        }
        actions.appendChild(html('button', { onClick: () => controlAnalysis('cancel') }, '\u2715 Cancel'));
      }
      if (phase === 'failed') {
        actions.appendChild(html('button', { onClick: () => controlAnalysis('retry') }, '\uD83D\uDD04 Retry'));
        actions.appendChild(html('button', {
          style: 'background:#b71c1c;color:#fff',
          onClick: async () => {
            if (!confirm('Remove failed episode ' + episodeId + '? This clears the status and progress card.')) return;
            try {
              await fetch('/api/cancel-analysis/' + encodeURIComponent(episodeId), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deleteData: false })
              });
            } catch {}
            clearInterval(pollId);
            card.remove();
          }
        }, '\u2716 Remove'));
      }
      if (phase === 'complete') {
        actions.appendChild(html('button', { onClick: () => {
          clearInterval(pollId);
          delete episodeCache[collectionId];
          renderSeries(collectionId);
        }}, '\u2714 View Episodes'));
      }
      // Always show View Log button
      actions.appendChild(html('button', { onClick: () => openLogViewer(episodeId), style: 'background:var(--card-bg);color:var(--text-muted);border:1px solid #333' }, '\uD83D\uDCCB View Log'));
      card.appendChild(actions);
    }

    async function controlAnalysis(action) {
      try {
        await fetch('/api/analysis-control/' + encodeURIComponent(episodeId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action })
        });
      } catch (e) {
        console.error('Control action failed:', e);
      }
    }

    // ─── Live Log Viewer ───
    function openLogViewer(epId) {
      var logPollId = null;
      var lastLineCount = 0;
      var autoScroll = true;

      var overlay = html('div', { className: 'log-overlay', onClick: function(e) { if (e.target === overlay) closeLog(); } });
      var modal = html('div', { className: 'log-modal' });

      var hdr = html('div', { className: 'log-header' });
      hdr.appendChild(html('span', { className: 'log-title' }, '\uD83D\uDDA5 ' + epId + ' — Analysis Log'));
      var metaSpan = html('span', { className: 'log-meta' }, 'Loading...');
      hdr.appendChild(metaSpan);
      hdr.appendChild(html('button', { onClick: closeLog }, '\u2715'));
      modal.appendChild(hdr);

      var body = html('div', { className: 'log-body' });
      body.addEventListener('scroll', function() {
        autoScroll = (body.scrollHeight - body.scrollTop - body.clientHeight) < 50;
      });
      modal.appendChild(body);

      var footer = html('div', { className: 'log-footer' });
      var footerLeft = html('span', null, '');
      var footerRight = html('span', null, '');
      footer.appendChild(footerLeft);
      footer.appendChild(footerRight);
      modal.appendChild(footer);

      overlay.appendChild(modal);
      document.body.appendChild(overlay);

      function colorLine(line) {
        var div = document.createElement('div');
        div.className = 'log-line';
        if (/error|failed|❌|⛔/i.test(line)) div.className += ' error';
        else if (/warning|⚠|retry|attempt/i.test(line)) div.className += ' warning';
        else if (/✅|complete|success/i.test(line)) div.className += ' success';
        else if (/cache|💰|cached/i.test(line)) div.className += ' cache';
        else if (/📤|📋|🎬|🔍|📸|📝/i.test(line)) div.className += ' info';
        div.textContent = line;
        return div;
      }

      async function fetchLog() {
        try {
          var resp = await fetch('/api/analysis-log/' + encodeURIComponent(epId) + '?offset=' + lastLineCount);
          var data = await resp.json();

          if (lastLineCount === 0) {
            body.innerHTML = '';
            var lines = (data.log || '').split('\n');
            lines.forEach(function(line) { body.appendChild(colorLine(line)); });
            lastLineCount = data.totalLines || 0;
          } else if (data.totalLines > lastLineCount) {
            var newLines = (data.log || '').split('\n');
            newLines.forEach(function(line) { if (line) body.appendChild(colorLine(line)); });
            lastLineCount = data.totalLines;
          }

          metaSpan.textContent = (data.file || '') + ' (' + ((data.size || 0) / 1024).toFixed(1) + ' KB)';
          footerLeft.textContent = lastLineCount + ' lines';
          footerRight.textContent = 'Polling every 2s' + (autoScroll ? ' • Auto-scroll ON' : '');

          if (autoScroll) body.scrollTop = body.scrollHeight;
        } catch (e) {
          metaSpan.textContent = 'Error: ' + e.message;
        }
      }

      function closeLog() {
        if (logPollId) clearInterval(logPollId);
        overlay.remove();
      }

      fetchLog();
      logPollId = setInterval(fetchLog, 2000);
    }

    async function poll() {
      try {
        const resp = await fetch('/api/analysis-status/' + encodeURIComponent(episodeId));
        if (!resp.ok) {
          render({ phase: 'waiting' });
          return;
        }
        const status = await resp.json();
        render(status);

        if (status.phase === 'complete') {
          clearInterval(pollId);
          delete episodeCache[collectionId];
        } else if (status.phase === 'failed') {
          // Keep polling in case of retry, but slow down
          clearInterval(pollId);
          pollId = setInterval(poll, 10000);
        }
      } catch (e) {
        render({ phase: 'waiting' });
      }
    }

    // Initial render
    render({ phase: 'uploading' });

    // Start polling
    pollId = setInterval(poll, 3000);
    poll();
  }

  // ─── Import Dialog ───
  function showImportDialog() {
    const overlay = html('div', {
      style: 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center',
      onClick: (e) => { if (e.target === overlay) overlay.remove(); }
    });

    const dialog = html('div', {
      style: 'background:var(--card-bg);border-radius:12px;padding:24px;width:450px;max-width:90vw;border:1px solid #333'
    });

    dialog.appendChild(html('h3', { style: 'color:var(--accent);margin-bottom:8px' }, 'Import Collection'));
    dialog.appendChild(html('p', { style: 'color:var(--text-dim);font-size:12px;margin-bottom:16px' },
      'Select a .vstack.zip file exported from another vstack instance. This will import all episode metadata and frame thumbnails.'));

    const fileInput = document.createElement('input');
    fileInput.type = 'file';
    fileInput.accept = '.zip,.vstack.zip';
    fileInput.style.cssText = 'width:100%;padding:8px;background:#0a0a1a;border:1px solid #333;color:#eee;border-radius:4px;margin-bottom:10px';

    const statusDiv = html('div', { style: 'color:var(--text-dim);font-size:12px;margin-top:8px;min-height:20px' });

    const btnRow = html('div', { style: 'display:flex;gap:8px;margin-top:16px;justify-content:flex-end' });
    btnRow.appendChild(html('button', {
      className: 'btn',
      style: 'background:#333;color:#aaa',
      onClick: () => overlay.remove()
    }, 'Cancel'));

    const importBtn = html('button', {
      className: 'btn',
      onClick: async () => {
        if (!fileInput.files?.length) { statusDiv.textContent = 'Select a file first'; return; }
        const file = fileInput.files[0];
        statusDiv.textContent = 'Importing ' + file.name + ' (' + (file.size / 1024 / 1024).toFixed(1) + ' MB)...';
        importBtn.disabled = true;
        importBtn.textContent = 'Importing...';

        try {
          const buffer = await file.arrayBuffer();
          const resp = await fetch('/api/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/octet-stream' },
            body: buffer
          });
          const result = await resp.json();
          if (result.success) {
            statusDiv.style.color = '#4caf50';
            statusDiv.textContent = result.message;
            seriesList = null; // bust cache
            setTimeout(() => { overlay.remove(); renderHome(); }, 1500);
          } else {
            statusDiv.style.color = '#e94560';
            statusDiv.textContent = 'Error: ' + (result.error || 'Unknown error');
            importBtn.disabled = false;
            importBtn.textContent = 'Import';
          }
        } catch (e) {
          statusDiv.style.color = '#e94560';
          statusDiv.textContent = 'Error: ' + e.message;
          importBtn.disabled = false;
          importBtn.textContent = 'Import';
        }
      }
    }, 'Import');
    btnRow.appendChild(importBtn);

    dialog.appendChild(fileInput);
    dialog.appendChild(statusDiv);
    dialog.appendChild(btnRow);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
  }

  // ─── Rebuild Report ───
  async function rebuildReport(episodeId) {
    if (!confirm('Rebuild Scene Review Report for ' + episodeId + '?')) return;
    try {
      const resp = await fetch('/api/rebuild-report/' + encodeURIComponent(episodeId), { method: 'POST' });
      const result = await resp.json();
      if (result.success) {
        alert(result.message);
      } else {
        alert('Rebuild failed: ' + (result.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Rebuild failed: ' + e.message);
    }
  }

  // ─── Restore Episode from File ───
  async function restoreEpisodeFromFile(file, seriesId) {
    // Try to detect episode ID from filename (e.g. "S02E01 - The Child.vstack.zip")
    const nameMatch = file.name.match(/^(S\d+E\d+)/i);
    let episodeId = nameMatch ? nameMatch[1].toUpperCase() : null;

    if (!episodeId) {
      episodeId = prompt('Could not detect episode ID from filename.\nEnter episode ID (e.g. S02E01):');
      if (!episodeId) return;
      episodeId = episodeId.trim().toUpperCase();
    }

    if (!confirm('Restore episode ' + episodeId + ' from "' + file.name + '"?\n\nThis will create or overwrite the episode data.')) return;

    try {
      const resp = await fetch('/api/import-episode/' + encodeURIComponent(episodeId), {
        method: 'POST',
        body: file
      });
      const result = await resp.json();
      if (result.success) {
        // Assign to this series
        if (seriesId) {
          await fetch('/api/assign-episode', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ episodeId, seriesId })
          }).catch(() => {});
        }
        alert(result.message);
        episodeCache[seriesId] = null;
        renderSeries(seriesId);
      } else {
        alert('Restore failed: ' + (result.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Restore failed: ' + e.message);
    }
  }

  // ─── Rename Episode ───
  function showRenameDialog(episodeId, currentTitle) {
    const overlay = html('div', {
      style: 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;display:flex;align-items:center;justify-content:center',
      onClick: (e) => { if (e.target === overlay) overlay.remove(); }
    });

    const dialog = html('div', {
      style: 'background:var(--card-bg);border-radius:12px;padding:24px;width:400px;max-width:90vw;border:1px solid #333'
    });

    dialog.appendChild(html('h3', { style: 'color:var(--accent);margin-bottom:16px' }, 'Rename Episode'));
    dialog.appendChild(html('div', { style: 'color:var(--text-muted);font-size:12px;margin-bottom:8px' }, episodeId));

    const input = document.createElement('input');
    input.value = currentTitle;
    input.style.cssText = 'width:100%;padding:8px;background:#0a0a1a;border:1px solid #333;color:#eee;border-radius:4px;font-size:14px';
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doRename(); });
    dialog.appendChild(input);

    const btnRow = html('div', { style: 'display:flex;gap:8px;margin-top:16px;justify-content:flex-end' });
    btnRow.appendChild(html('button', { className: 'btn btn-secondary', style: 'padding:6px 14px', onClick: () => overlay.remove() }, 'Cancel'));
    btnRow.appendChild(html('button', { className: 'btn', style: 'padding:6px 14px', onClick: doRename }, 'Save'));
    dialog.appendChild(btnRow);

    async function doRename() {
      const newTitle = input.value.trim();
      if (!newTitle) return;
      try {
        const resp = await fetch('/api/rename-episode/' + encodeURIComponent(episodeId), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: newTitle })
        });
        const result = await resp.json();
        if (result.success) {
          const titleEl = document.getElementById('ep-title');
          if (titleEl) titleEl.textContent = newTitle;
          episodeDetailCache[episodeId] = null;
          // Update cache in episode lists too
          for (const eps of Object.values(episodeCache)) {
            const ep = eps.find(e => String(e.id) === String(episodeId));
            if (ep) ep.title = newTitle;
          }
          overlay.remove();
        } else {
          alert('Rename failed: ' + (result.error || 'Unknown error'));
        }
      } catch (e) {
        alert('Rename failed: ' + e.message);
      }
    }

    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
    input.select();
    input.focus();
  }

  // ─── Episode Export/Import/Revert ───
  function exportEpisode(episodeId, title) {
    const safeName = (episodeId + ' - ' + title).replace(/[^a-zA-Z0-9_\- ]/g, '').trim();
    const a = document.createElement('a');
    a.href = '/api/export-episode/' + encodeURIComponent(episodeId);
    a.download = safeName + '.vstack.zip';
    a.click();
  }

  async function importEpisode(episodeId, file) {
    if (!confirm('Restore ' + episodeId + ' from backup file?\n\nCurrent data will be backed up before overwriting.')) return;

    try {
      const resp = await fetch('/api/import-episode/' + encodeURIComponent(episodeId), {
        method: 'POST',
        body: file
      });
      const result = await resp.json();
      if (result.success) {
        alert(result.message);
        episodeDetailCache[episodeId] = null;
        renderEpisode(episodeId);
      } else {
        alert('Import failed: ' + (result.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Import failed: ' + e.message);
    }
  }

  async function revertEpisode(episodeId) {
    if (!confirm('Revert ' + episodeId + ' to original analysis?\n\nThis will restore scenes.json from backup, re-extract all frames, and rebuild the database.\n\nThis cannot be undone.')) return;

    try {
      const resp = await fetch('/api/revert/' + encodeURIComponent(episodeId), { method: 'POST' });
      const result = await resp.json();
      if (result.success) {
        alert(result.message);
        episodeDetailCache[episodeId] = null;
        renderEpisode(episodeId);
      } else {
        alert('Revert failed: ' + (result.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Revert failed: ' + e.message);
    }
  }

  // ─── Delete Episode ───
  async function deleteEpisode(episodeId, parentSeriesId) {
    if (!confirm('Delete episode ' + episodeId + '?\n\nThis will remove:\n- scenes.json and all metadata\n- All frame thumbnails\n- Database records\n- Scene Review Report\n\nMake sure you have a backup first!')) return;

    // Double confirm
    const typed = prompt('Type the episode ID to confirm deletion:', '');
    if (typed !== episodeId) { alert('Deletion cancelled — ID did not match.'); return; }

    try {
      const resp = await fetch('/api/delete-episode/' + encodeURIComponent(episodeId), { method: 'DELETE' });
      const result = await resp.json();
      if (result.success) {
        alert(result.message);
        episodeDetailCache[episodeId] = null;
        for (const key of Object.keys(episodeCache)) { episodeCache[key] = null; }
        if (parentSeriesId) navigate('/series/' + parentSeriesId);
        else navigate('/home');
      } else {
        alert('Delete failed: ' + (result.error || 'Unknown error'));
      }
    } catch (e) {
      alert('Delete failed: ' + e.message);
    }
  }

  // ─── Routing ───
  function navigate(path) {
    window.location.hash = path;
  }

  // ─── Supercut Helpers ───
  function nc(c) {
    // Normalize clip: handle both snake_case (DB) and camelCase (saved)
    return {
      episodeId: c.episodeId || c.episode_id || '',
      sceneNumber: c.sceneNumber || c.scene_number || 0,
      shotNumber: c.shotNumber || c.shot_number || 0,
      startSec: c.startSec || c.start_sec || 0,
      endSec: c.endSec || c.end_sec || 0,
      duration: c.duration || c.duration_sec || (c.endSec || c.end_sec || 0) - (c.startSec || c.start_sec || 0) || 3,
      shotType: c.shotType || c.shot_type || '',
      subject: c.subject || '',
      action: c.action || '',
      expressions: c.expressions || '',
      ...c
    };
  }

  // ─── Supercut Search Dialog ───
  function showNewSupercutDialog() {
    const overlay = html('div', { style: 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:center;justify-content:center;overflow-y:auto' });
    const dialog = html('div', { style: 'background:var(--card-bg);border-radius:12px;padding:24px;width:700px;max-width:95vw;max-height:90vh;overflow-y:auto;border:1px solid #e94560' });

    dialog.appendChild(html('h3', { style: 'color:#e94560;margin-bottom:16px' }, '\u2702 New Supercut'));

    const queryInput = document.createElement('input');
    queryInput.placeholder = 'What moments are you looking for? (e.g. "Picard smiling", "Worf being gruff")';
    queryInput.style.cssText = 'width:100%;padding:12px;background:#0a0a1a;border:1px solid #333;color:#eee;border-radius:6px;font-size:15px;margin-bottom:12px';

    const settingsRow = html('div', { style: 'display:flex;gap:12px;margin-bottom:12px;font-size:12px;color:var(--text-muted)' });
    const limitInput = document.createElement('input');
    limitInput.type = 'number'; limitInput.value = '25'; limitInput.min = '5'; limitInput.max = '100';
    limitInput.style.cssText = 'width:60px;padding:4px;background:#0a0a1a;border:1px solid #333;color:#eee;border-radius:3px;font-size:12px';
    settingsRow.appendChild(html('span', null, 'Max clips: ')); settingsRow.appendChild(limitInput);

    const searchBtn = html('button', { style: 'padding:10px 20px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;margin-bottom:16px', onClick: doSearch }, '\uD83D\uDD0D Search');
    const cancelBtn = html('button', { style: 'padding:10px 20px;background:#333;color:#aaa;border:none;border-radius:6px;cursor:pointer;font-size:14px;margin-left:8px;margin-bottom:16px', onClick: () => overlay.remove() }, 'Cancel');

    const resultsDiv = html('div', { id: 'sc-results' });

    dialog.appendChild(queryInput);
    dialog.appendChild(settingsRow);
    dialog.appendChild(html('div', null, searchBtn, cancelBtn));
    dialog.appendChild(resultsDiv);
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
    queryInput.focus();

    queryInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
      const query = queryInput.value.trim();
      if (!query) return;
      resultsDiv.innerHTML = '<div style="color:var(--text-muted);padding:20px;text-align:center">Searching...</div>';

      try {
        const resp = await fetch('/api/supercut/search', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, limit: parseInt(limitInput.value) || 25 })
        });
        const data = await resp.json();
        if (data.clips) data.clips = data.clips.map(nc);
        if (!data.clips?.length) { resultsDiv.innerHTML = '<div style="color:#e94560;padding:20px;text-align:center">No clips found</div>'; return; }

        resultsDiv.innerHTML = '';
        resultsDiv.appendChild(html('div', { style: 'color:var(--text-muted);margin-bottom:8px;font-size:12px' }, data.clips.length + ' clips found | Total: ' + data.clips.reduce((s,c) => s + (c.duration_sec||c.durationSec||3), 0).toFixed(0) + 's'));

        const selectAll = { checked: true };
        const clipStates = data.clips.map(() => ({ selected: true }));

        const grid = html('div', { style: 'display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;max-height:400px;overflow-y:auto;margin-bottom:16px' });

        data.clips.forEach((clip, i) => {
          const dur = (clip.duration || clip.durationSec || clip.endSec - clip.startSec || 3).toFixed(1);
          const thumbUrl = '/' + clip.episodeId + '/frames/sc' + clip.sceneNumber + '_sh' + clip.shotNumber + '_first.jpg';

          const card = html('div', { style: 'background:#0a0a1a;border-radius:6px;padding:8px;cursor:pointer;border:2px solid #333;transition:border-color 0.2s', onClick: () => {
            clipStates[i].selected = !clipStates[i].selected;
            card.style.borderColor = clipStates[i].selected ? '#4caf50' : '#333';
            card.style.opacity = clipStates[i].selected ? '1' : '0.4';
          }});
          card.style.borderColor = '#4caf50';

          const img = document.createElement('img');
          img.src = thumbUrl; img.style.cssText = 'width:100%;height:100px;object-fit:cover;border-radius:4px';
          img.onerror = function() { this.style.display = 'none'; };
          card.appendChild(img);
          card.appendChild(html('div', { style: 'font-size:10px;color:var(--accent);margin-top:4px' }, clip.episodeId + ' | ' + dur + 's | ' + (clip.shotType || '')));
          card.appendChild(html('div', { style: 'font-size:11px;color:#eee;margin-top:2px' }, (clip.subject || '').slice(0, 40)));
          card.appendChild(html('div', { style: 'font-size:10px;color:var(--text-muted);margin-top:2px' }, (clip.action || '').slice(0, 60)));
          grid.appendChild(card);
        });
        resultsDiv.appendChild(grid);

        // Project name + Create button
        const nameInput = document.createElement('input');
        nameInput.value = query.replace(/[^a-z0-9]/gi, '-').toLowerCase().slice(0, 30);
        nameInput.placeholder = 'Project name';
        nameInput.style.cssText = 'width:200px;padding:8px;background:#0a0a1a;border:1px solid #333;color:#eee;border-radius:4px;font-size:13px;margin-right:8px';

        const createBtn = html('button', { style: 'padding:10px 20px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold', onClick: async () => {
          const selected = data.clips.filter((_, i) => clipStates[i].selected);
          if (!selected.length) { alert('Select at least one clip'); return; }
          const name = nameInput.value.trim() || 'supercut-' + Date.now();
          try {
            await fetch('/api/supercut/create', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name, query, clips: selected })
            });
            overlay.remove();
            navigate('/supercut/' + encodeURIComponent(name));
          } catch (e) { alert('Failed: ' + e.message); }
        }}, '\u2702 Create Supercut (' + data.clips.length + ' clips)');

        resultsDiv.appendChild(html('div', { style: 'display:flex;align-items:center;margin-top:8px' }, nameInput, createBtn));

      } catch (e) { resultsDiv.innerHTML = '<div style="color:#e94560;padding:20px">Search failed: ' + e.message + '</div>'; }
    }
  }

  // ─── Supercut Preview Page ───
  async function renderSupercut(projectName) {
    app.innerHTML = '';
    app.appendChild(renderLoading());

    try {
      const data = await api('/api/supercut/' + encodeURIComponent(projectName));
      if (data.clips) data.clips = data.clips.map(nc);
      app.innerHTML = '';
      const wrap = html('div', { className: 'fade-in' });

      wrap.appendChild(html('button', { className: 'back-btn', onClick: () => navigate('/series/default') }, '\u2190 Back'));
      wrap.appendChild(html('h1', { className: 'page-title', style: 'color:#e94560' }, '\u2702 ' + projectName));
      if (data.config?.query) wrap.appendChild(html('div', { style: 'color:var(--text-muted);margin-bottom:16px' }, 'Query: "' + data.config.query + '"'));

      const totalDur = data.clips.reduce((s, c) => s + (c.duration_sec || c.durationSec || c.end_sec - c.start_sec || 3), 0);
      wrap.appendChild(html('div', { style: 'color:var(--text-muted);margin-bottom:16px;font-size:13px' }, data.clips.length + ' clips | ' + totalDur.toFixed(0) + 's total (' + (totalDur / 60).toFixed(1) + ' min)'));

      // Action buttons
      const actions = html('div', { style: 'display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap' });
      actions.appendChild(html('button', { className: 'btn', style: 'background:#4caf50', onClick: async () => {
        try {
          const resp = await fetch('/api/supercut/' + encodeURIComponent(projectName) + '/generate', { method: 'POST' });
          const result = await resp.json();
          if (result.success) {
            event.target.textContent = '\u2705 Generated!';
            setTimeout(() => { event.target.textContent = '\uD83C\uDFAC Generate Composition'; }, 2000);
          } else {
            alert('Failed: ' + (result.error || 'unknown'));
          }
        } catch (e) { alert('Failed: ' + e.message); }
      }}, '\uD83C\uDFAC Generate Composition'));
      actions.appendChild(html('button', { className: 'btn', style: 'background:#ff9800;color:#000;font-weight:bold', onClick: async () => {
        try {
          const btn = event.target;
          btn.textContent = '\u23F3 Launching Remotion...';
          btn.disabled = true;
          const resp = await fetch('/api/supercut/' + encodeURIComponent(projectName) + '/preview', { method: 'POST' });
          const result = await resp.json();
          if (result.success) {
            btn.textContent = '\u2705 Studio launching!';
            setTimeout(() => window.open('http://localhost:3000', '_blank'), 3000);
          } else {
            btn.textContent = '\u274C ' + (result.error || 'Failed');
            setTimeout(() => { btn.textContent = '\uD83C\uDFAC Preview in Remotion'; btn.disabled = false; }, 3000);
          }
        } catch (e) { alert('Failed: ' + e.message); }
      }}, '\uD83C\uDFAC Preview in Remotion'));
      actions.appendChild(html('button', { className: 'btn', style: 'background:#1a1a2e;border:1px solid #333', onClick: () => {
        const projPath = 'gemini-analysis/_supercuts/' + projectName;
        window.open('/' + projPath + '/scenes.ts', '_blank');
      }}, '\uD83D\uDCC4 View scenes.ts'));
      actions.appendChild(html('button', { className: 'btn', style: 'background:#e94560', onClick: async () => {
        if (!confirm('Delete this supercut?')) return;
        await fetch('/api/supercut/' + encodeURIComponent(projectName), { method: 'DELETE' });
        navigate('/series/default');
      }}, '\uD83D\uDDD1 Delete'));
      wrap.appendChild(actions);

      // Clip list
      const clipList = html('div', { style: 'display:flex;flex-direction:column;gap:6px' });

      data.clips.forEach((clip, i) => {
        const dur = (clip.duration || clip.durationSec || clip.endSec - clip.startSec || 3).toFixed(1);
        const thumbUrl = '/' + clip.episodeId + '/frames/sc' + clip.sceneNumber + '_sh' + clip.shotNumber + '_first.jpg';

        const row = html('div', { style: 'display:flex;gap:10px;background:#0a0a1a;border-radius:6px;padding:8px;align-items:center;border-left:3px solid #e94560' });

        row.appendChild(html('div', { style: 'color:#555;font-size:11px;min-width:20px;text-align:center;font-weight:bold' }, String(i + 1)));

        const img = document.createElement('img');
        img.src = thumbUrl; img.style.cssText = 'width:120px;height:68px;object-fit:cover;border-radius:4px;flex-shrink:0';
        img.onerror = function() { this.style.background = '#1a1a2e'; };
        row.appendChild(img);

        const info = html('div', { style: 'flex:1;min-width:0' });
        info.appendChild(html('div', { style: 'font-size:12px;color:var(--accent)' }, clip.episodeId + ' | ' + (clip.shotType || '') + ' | ' + dur + 's'));
        info.appendChild(html('div', { style: 'font-size:13px;color:#eee;font-weight:500' }, (clip.subject || 'Unknown').slice(0, 50)));
        info.appendChild(html('div', { style: 'font-size:11px;color:var(--text-muted)' }, (clip.action || '').slice(0, 100)));
        if (clip.expressions) {
          const expr = typeof clip.expressions === 'string' ? clip.expressions : JSON.stringify(clip.expressions);
          info.appendChild(html('div', { style: 'font-size:10px;color:#ff9800;margin-top:2px' }, expr.slice(0, 80)));
        }
        row.appendChild(info);

        // Remove button
        row.appendChild(html('button', { style: 'background:none;border:none;color:#555;cursor:pointer;font-size:16px;padding:4px 8px', onClick: async () => {
          data.clips.splice(i, 1);
          await fetch('/api/supercut/' + encodeURIComponent(projectName) + '/clips', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ clips: data.clips })
          });
          renderSupercut(projectName);
        }}, '\u2716'));

        clipList.appendChild(row);
      });

      wrap.appendChild(clipList);
      app.appendChild(wrap);
    } catch (e) {
      app.innerHTML = '';
      app.appendChild(renderError(e.message));
    }
  }

  function route() {
    const hash = window.location.hash.slice(1) || '/';
    const parts = hash.split('/').filter(Boolean);

    if (parts[0] === 'series' && parts[1]) {
      renderSeries(parts[1]);
    } else if (parts[0] === 'episode' && parts[1]) {
      renderEpisode(parts[1]);
    } else if (parts[0] === 'supercut' && parts[1]) {
      renderSupercut(decodeURIComponent(parts[1]));
    } else if (parts[0] === 'advanced') {
      renderAdvanced();
    } else if (parts[0] === 'home') {
      renderHome();
    } else {
      renderHome();
    }
  }

  window.addEventListener('hashchange', route);

  // Keyboard shortcuts removed (search bar removed from header)

  // Initial route
  route();
})();
</script>
</body>
